baseURL = "https://luis-fer-333.github.io/"
languageCode = "en-us"
title = "Luis Núñez — Analytics Engineer"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
ignoreLogs = ['warning-partial-superfluous-prefix']

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Analytics Engineer — data lakes, ETL pipelines, SQL modeling, BI dashboards."
  author = "Luis Núñez"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false

  [params.homeInfoParams]
    Title = "Luis Núñez"
    Content = """
Analytics Engineer with 3+ years at Amazon, building production data pipelines, SQL models, and BI dashboards across 13 EU countries. Over **€100M** in savings and recovered value.

**Stack:** SQL (Redshift, CTEs, window functions) · Python (pandas, PySpark, Lambda) · AWS (S3, Glue, Athena) · dbt-style modeling (medallion, star schema) · BI (QuickSight, Preset, Tableau) · Orchestration (Prefect, Lambda)

**What I do:** I take messy multi-source data and turn it into clean, tested, analytics-ready tables that BI teams and stakeholders can actually use — from ingestion through modeling to dashboards.

Browse my [projects](/projects/) or learn more [about me](/about/).
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/luis-fer-333"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/lun3429"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:luisfernando064@gmail.com"

  [params.assets]
    disableHLJS = false

[menu]
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
